<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลนักเรียนสุดคิวท์ 🐾</title>
    <!-- นำเข้า Google Fonts เพื่อความทันสมัย -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #4caf50;
            --mint-green: #e8f5e9;
            --soft-blue: #e3f2fd;
            --deep-blue: #1e88e5;
            --text-color: #2c3e50;
            --border-color: #cfd8dc;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--soft-blue);
            /* เพิ่มลูกเล่นลายอุ้งเท้าแมวพื้นหลังเบาๆ */
            background-image: radial-gradient(var(--mint-green) 20%, transparent 20%),
                              radial-gradient(var(--mint-green) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            background: var(--white);
            max-width: 850px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            position: relative;
            overflow: hidden;
            border: 4px solid var(--mint-green);
        }

        /* ตกแต่งหัวข้อฟอร์มด้วยน้องแมว */
        .form-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .form-header h1 {
            color: var(--primary-green);
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .form-header p {
            color: #78909c;
            font-size: 15px;
        }

        /* ตกแต่ง Section (Fieldset) */
        fieldset {
            border: 2px solid var(--soft-blue);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            background-color: #fffffa;
            transition: all 0.3s ease;
        }

        fieldset:hover {
            border-color: var(--primary-green);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.05);
        }

        legend {
            font-weight: 600;
            color: var(--deep-blue);
            padding: 0 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--soft-blue);
            border-radius: 20px;
            padding: 4px 15px;
        }

        /* การจัดเลย์เอาท์ Grid ภายในฟอร์ม */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group.full-width-3 {
            grid-column: span 3;
        }

        label {
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            color: #455a64;
        }

        /* ตกแต่งกล่อง Input ต่างๆ */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background-color: #fafafa;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-green);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        /* ตกแต่งกลุ่ม Radio และ Checkbox */
        .radio-group, .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding-top: 5px;
        }

        .radio-label, .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-green);
            cursor: pointer;
        }

        /* สไตล์พิเศษสำหรับ Color Picker */
        input[type="color"] {
            border: none;
            width: 100%;
            height: 45px;
            border-radius: 10px;
            cursor: pointer;
            background: none;
        }

        /* สไตล์ไฟล์อัปโหลด */
        input[type="file"] {
            background: var(--white);
            padding: 8px;
            border: 1.5px dashed var(--border-color);
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="file"]:hover {
            border-color: var(--deep-blue);
            background: var(--soft-blue);
        }

        /* ยืนยันข้อมูล & ข้อตกลง */
        .agreement-box {
            margin: 25px 0;
            padding: 15px;
            background-color: var(--mint-green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* กลุ่มปุ่มกด */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        button {
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button[type="submit"] {
            background-color: var(--primary-green);
            color: var(--white);
        }

        button[type="submit"]:hover {
            background-color: #388e3c;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
        }

        button[type="reset"] {
            background-color: #eceff1;
            color: #607d8b;
        }

        button[type="reset"]:hover {
            background-color: #cfd8dc;
            color: #37474f;
            transform: translateY(-2px);
        }

        /* แมวตกแต่งมุมขวาบนฟอร์ม (CSS Art แบบน่ารักๆ) */
        .cat-decoration {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            opacity: 0.8;
            user-select: none;
        }

        /* Responsive สำหรับหน้าจอมือถือ */
        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            .form-group.full-width, .form-group.full-width-3 {
                grid-column: span 1;
            }
            .form-container {
                padding: 20px;
            }
            .btn-group {
                flex-direction: column;
                gap: 10px;
            }
            button {
                width: 100%;
            }
            .cat-decoration {
                display: none; /* ซ่อนในมือถือเพื่อไม่ให้บังตัวอักษร */
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <!-- ตกแต่งไอคอนแมวเหมียว -->
        <div class="cat-decoration">🐾🐱</div>
        
        <div class="form-header">
            <h1>ครูเหมียวชวนกรอก <span>📝</span> ข้อมูลนักเรียน</h1>
            <p>กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้องนะเหมียว~</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>🐱 1. ข้อมูลส่วนตัว</legend>
                <div class="grid-3">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected>เลือกคำนำหน้า</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                            <option value="เด็กชาย">เด็กชาย</option>
                            <option value="เด็กหญิง">เด็กหญิง</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="สมชาย ใจดี" required>
                    </div>
                </div>

                <div class="grid-3">
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="น้องเหมียว">
                    </div>
                    <div class="form-group">
                        <label for="student-id">เลขประจำตัวนักเรียน</label>
                        <input type="text" id="student-id" name="student_id" pattern="[0-9]{5}" placeholder="5 หลัก เช่น 12345" required>
                    </div>
                    <div class="form-group">
                        <label for="birthdate">วันเดือนปีเกิด</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                </div>

                <div class="grid-3">
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="1" max="100" placeholder="เช่น 15" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>📞 2. ข้อมูลการติดต่อ</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="student@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{9,10}" placeholder="เช่น 0987654321" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" rows="3" placeholder="บ้านเลขที่ ถนน แขวง/ตำบล..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>👤 3. ข้อมูลส่วนบุคคล</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="gender" value="ชาย" required> ชาย</label>
                            <label class="radio-label"><input type="radio" name="gender" value="หญิง"> หญิง</label>
                            <label class="radio-label"><input type="radio" name="gender" value="อื่นๆ"> อื่นๆ/ไม่ระบุ</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion">
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">ฮินดู</option>
                            <option value="อื่นๆ">อื่นๆ</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="province">จังหวัด</label>
                        <input type="text" id="province" name="province" placeholder="กรุงเทพมหานคร" required>
                    </div>
                    <div class="form-group">
                        <label for="blood-group">กรุ๊ปเลือด</label>
                        <select id="blood-group" name="blood_group">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>🎨 4. ความสนใจ</legend>
                <div class="form-group">
                    <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="hobbies" value="อ่านหนังสือ"> อ่านหนังสือ</label>
                        <label class="checkbox-label"><input type="checkbox" name="hobbies" value="เล่นเกม"> เล่นเกม</label>
                        <label class="checkbox-label"><input type="checkbox" name="hobbies" value="เล่นกีฬา"> เล่นกีฬา</label>
                        <label class="checkbox-label"><input type="checkbox" name="hobbies" value="ฟังเพลง/ดูหนัง"> ฟังเพลง/ดูหนัง</label>
                        <label class="checkbox-label"><input type="checkbox" name="hobbies" value="วาดภาพ"> วาดภาพ</label>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="fav-color">สีที่ชอบ</label>
                        <input type="color" id="fav-color" name="fav_color" value="#4caf50">
                    </div>
                    <div class="form-group">
                        <label for="fav-url">เว็บไซต์ที่ชอบ (URL)</label>
                        <input type="url" id="fav-url" name="fav_url" placeholder="https://www.google.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>🏫 5. ข้อมูลการศึกษา</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="education-level">ระดับชั้น</label>
                        <select id="education-level" name="education_level" required>
                            <option value="มัธยมศึกษาปีที่ 1">มัธยมศึกษาปีที่ 1</option>
                            <option value="มัธยมศึกษาปีที่ 2">มัธยมศึกษาปีที่ 2</option>
                            <option value="มัธยมศึกษาปีที่ 3">มัธยมศึกษาปีที่ 3</option>
                            <option value="มัธยมศึกษาปีที่ 4">มัธยมศึกษาปีที่ 4</option>
                            <option value="มัธยมศึกษาปีที่ 5">มัธยมศึกษาปีที่ 5</option>
                            <option value="มัธยมศึกษาปีที่ 6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classroom">ห้องเรียน</label>
                        <input type="number" id="classroom" name="classroom" min="1" max="15" placeholder="เช่น 1" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="program">แผนการเรียน</label>
                        <input type="text" id="program" name="program" placeholder="เช่น วิทย์-คณิต / ศิลป์-ภาษา" required>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPAX)</label>
                        <input type="number" id="gpa" name="gpa" min="0.00" max="4.00" step="0.01" placeholder="4.00" required>
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>📁 6. การอัปโหลดไฟล์</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="avatar">รูปภาพประจำตัว (ภาพเดี่ยว)</label>
                        <input type="file" id="avatar" name="avatar" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="documents">เอกสารเพิ่มเติม (เช่น ปพ.1 / ทะเบียนบ้าน)</label>
                        <input type="file" id="documents" name="documents" accept=".pdf,.doc,.docx">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>💬 7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group">
                    <label for="comments">แสดงความคิดเห็นหรือข้อเสนอแนะเพิ่มเติม</label>
                    <textarea id="comments" name="comments" rows="4" placeholder="พิมพ์ข้อความที่นี่เหมียว..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="agreement-box">
                <label class="checkbox-label">
                    <input type="checkbox" name="agreement" value="accepted" required>
                    ข้าพเจ้ายินยอมให้ระบบบันทึกและตรวจสอบข้อมูลดังกล่าวว่าเป็นความจริง 🐾
                </label>
            </div>

            <div class="btn-group">
                <button type="submit">ส่งข้อมูลเรียบร้อย ✨</button>
                <button type="reset">ล้างข้อมูลใหม่ 🔄</button>
            </div>

        </form>
    </div>

</body>
</html>
